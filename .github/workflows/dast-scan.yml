name: "ZAP DAST Scan (VulnerableApp)"

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/dast-scan.yml'
      - '.zap/af-plan.yaml'

jobs:
  dast-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build VulnerableApp
        run: ./gradlew bootJar -x test
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Start VulnerableApp
        run: |
          java -jar build/libs/VulnerableApp-1.0.0.jar \
            --spring.profiles.active=public,unsafe \
            --server.port=9090 > /tmp/app.log 2>&1 &
          echo "VulnerableApp started with PID $!"

      - name: Wait for VulnerableApp to be ready
        run: |
          echo "Waiting for VulnerableApp on port 9090..."
          for i in $(seq 1 36); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9090/VulnerableApp/ 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" != "000" ]; then
              echo "VulnerableApp is responding!"
              break
            fi
            sleep 5
          done
          # Show last 20 lines of startup log
          tail -20 /tmp/app.log || true

      - name: Make workspace writable for ZAP container
        run: chmod -R a+w "${GITHUB_WORKSPACE}"

      - name: Run ZAP Automation Framework scan
        run: |
          ZAP_EXIT=0
          docker run --rm --network host \
            -v "${GITHUB_WORKSPACE}:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd \
            -config api.disabledkey=true \
            -port 8090 \
            -autorun /zap/wrk/.zap/af-plan.yaml || ZAP_EXIT=$?
          echo "ZAP exit code: $ZAP_EXIT"
          [ "$ZAP_EXIT" -eq 0 ] || [ "$ZAP_EXIT" -eq 2 ] || exit "$ZAP_EXIT"

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: zap-report.json
